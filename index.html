    <style>
      /* Force scrollbar to always be visible to prevent layout shift */
      html {
        overflow-y: scroll;
      }
      
      body {
        background-color: #000000; /* black */
        color: #f5f5f5; /* neutral-100 */
      }
      
      /* Global override to prevent serif fonts in font-mono */
      .font-mono {
        font-family: inherit !important;
        font-variant-numeric: tabular-nums !important;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #404040;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #525252;
      }

      /* Print styles for PDF export */
      @media print {
        body {
          background-color: white !important;
          color: black !important;
        }
        nav, .no-print, button {
          display: none !important;
        }
        .bg-neutral-900\/20, .bg-neutral-900\/30 {
          background-color: #f3f4f6 !important;
          border-color: #e5e7eb !important;
        }
        .text-white, .text-neutral-100, .text-neutral-200 {
          color: black !important;
        }
        .text-neutral-500, .text-neutral-600 {
          color: #4b5563 !important;
        }
        .border-neutral-800, .border-neutral-800\/50 {
          border-color: #d1d5db !important;
        }
        canvas, .recharts-surface {
          max-width: 100% !important;
        }
      }
    </style>
